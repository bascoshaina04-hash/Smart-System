  <!-- Firebase + script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

      getFirestore, collection, query, where, onSnapshot, doc, getDoc, getDocs, limit
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAL3PqM_pZclC6QIzijirPZH7zweJ9Im8Y",
      authDomain: "smart-723de.firebaseapp.com",
      projectId: "smart-723de",
      storageBucket: "smart-723de.appspot.com",
      messagingSenderId: "316347306734",
      appId: "1:316347306734:web:51b4babfe97cdb2e06d9ff"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM refs
    const rowsTbody = document.getElementById('rows');
    const searchEl = document.getElementById('search');
    const statusFilter = document.getElementById('statusFilter');
    const detailModal = document.getElementById('detailModal');

    const cache = new Map();

    function escapeHtml(s){ if(s === undefined || s === null) return ''; return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[c])); }
    function initials(name){ if(!name) return ''; const p = name.split(/\s+/).filter(Boolean); return ((p[0]||'')[0]||'') + ((p[1]||'')[0]||''); }

    function renderRowsFromCache(){
  const rows = Array.from(cache.values());
  const q = (searchEl.value || '').trim().toLowerCase();
  const st = (statusFilter.value || 'all').toLowerCase();

  const filtered = rows.filter(r => {
    // normalize status
    let status =
      (r.status ||
       r.caseStatus ||
       r.case_state ||
       '').toString().toLowerCase();

    if (!status) status = 'pending';

    // status filter
    if (st !== 'all' && status !== st) return false;

    // search filter
    if (!q) return true;

    const text = `
      ${r.studentName || ''}
      ${r.name || ''}
      ${r.studentID || ''}
      ${r.caseTitle || ''}
      ${r.concern || ''}
      ${r.purpose || ''}
    `.toLowerCase();

    return text.includes(q);
  });

  rowsTbody.innerHTML = '';
  if (!filtered.length) {
    rowsTbody.innerHTML = `
      <tr>
        <td colspan="2" style="text-align:center;padding:18px;color:#666">
          No records found.
        </td>
      </tr>`;
    return;
  }

  filtered.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(r.studentName || r.name || '(No name)')}</td>
      <td>
        <div class="action-cell">
          <button class="view-btn">View Details</button>
        </div>
      </td>
    `;

    rowsTbody.appendChild(tr);

    tr.querySelector('.view-btn').addEventListener('click', async () => {
      await showStudentDetailsAndOpenModal(r);
    });
  });
}

    async function resolveStudentForRecord(record) {
  const studentIdTry = String(
    record.studentID || record.sid || record.studentId || ''
  ).trim();

  let studentDoc = null;

  // 1️⃣ Try direct document ID
  if (studentIdTry) {
    try {
      const snap = await getDoc(doc(db, 'students', studentIdTry));
      if (snap.exists()) return snap.data();
    } catch {}
  }

  // 2️⃣ Try querying by studentID / uid
  if (studentIdTry) {
    try {
      const q1 = query(
        collection(db, 'students'),
        where('studentID', '==', studentIdTry),
        limit(1)
      );
      const snaps = await getDocs(q1);
      if (snaps.size) return snaps.docs[0].data();
    } catch {}

    try {
      const q2 = query(
        collection(db, 'students'),
        where('uid', '==', studentIdTry),
        limit(1)
      );
      const snaps = await getDocs(q2);
      if (snaps.size) return snaps.docs[0].data();
    } catch {}
  }

  // 3️⃣ FINAL fallback: name match (same as View Details)
  if (record.studentName || record.name) {
    const nameTry = (record.studentName || record.name).toLowerCase();
    try {
      const snaps = await getDocs(collection(db, 'students'));
      for (const d of snaps.docs) {
        const data = d.data() || {};
        const cand = (
          data.name ||
          data.studentName ||
          data.fullName ||
          ''
        ).toLowerCase();

        if (cand && cand === nameTry) {
          return data;
        }
      }
    } catch {}
  }

  return null;
}


  async function exportCasesToPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('l', 'mm', 'a4'); // landscape = better table fit

  doc.setFontSize(16);
  doc.text('Guidance Counseling Records', 14, 15);

  doc.setFontSize(10);
  doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 22);

  const q = (searchEl.value || '').trim().toLowerCase();
  const st = (statusFilter.value || 'All').toLowerCase();

  const records = Array.from(cache.values()).filter(r => {
    const status =
      (r.status ||
        r.caseStatus ||
        (r.closed ? 'closed' : 'pending')).toLowerCase();

    if (st !== 'all' && status !== st) return false;
    if (!q) return true;

    const text = `
      ${r.studentName || ''}
      ${r.studentID || ''}
      ${r.concern || r.purpose || ''}
    `.toLowerCase();

    return text.includes(q);
  });

  const tableBody = [];

  for (const r of records) {
    const s = (await resolveStudentForRecord(r)) || {};

    tableBody.push([
      r.studentName || s.name || '—',
      r.studentID || s.studentID || '—',
      s.contact || s.mobile || s.contact_num || '—',
      s.email || '—',
      s.courseYear || s.course || r.courseYear || '—',
      r.concern || r.caseTitle || '—',
      r.purpose || '—',
      r.status || r.caseStatus || (r.closed ? 'Closed' : 'Pending')
    ]);
  }

  doc.autoTable({
    startY: 28,
    head: [[
      'Student Name',
      'Student ID',
      'Contact Number',
      'Email',
      'Course / Year',
      'Concern',
      'Purpose',
      'Status'
    ]],
    body: tableBody,
    styles: {
      fontSize: 8,
      cellPadding: 3
    },
    headStyles: {
      fillColor: [39, 62, 163],
      textColor: 255
    },
    alternateRowStyles: {
      fillColor: [245, 247, 255]
    }
  });

  doc.save('Guidance_Counseling_Records.pdf');
}

    // populate modal: NOTE: Case Title / Concern is single combined field (caseTitle || concern || purpose)
    function populateAndOpenModal({ studentDoc = null, apptDoc = null }) {

  // ✅ 1. ALWAYS define these FIRST
  const s = studentDoc || {};
  const a = apptDoc || {};

  // ✅ 2. Now it is SAFE to use s and a
  const displayName =
    s.name ||
    s.studentName ||
    a.studentName ||
    a.name ||
    '—';

  const studentIdVal = s.studentID || s.uid || a.studentID || a.sid || '—';
  const contact = s.contact || s.mobile || s.contact_num || a.contact || a.mobile || '—';
  const email = s.email || s.contactEmail || a.email || '—';
  const courseYear = s.courseYear || s.course || a.courseYear || a.course || '—';

  // Concern (replaces Case Title)
  const caseTitle =
    (a.caseTitle && a.caseTitle.trim()) ||
    (a.concern && a.concern.trim()) ||
    (a.purpose && a.purpose.trim()) ||
    a.title ||
    '—';

  const opened = a.openedAt || a.opened || a.createdAt || a.created || null;

  // Purpose
  let purpose = '—';
  if (a.purpose) purpose = a.purpose;
  else if (a._src === 'consultations') purpose = 'Consultation';

  // ✅ 3. Update DOM (only elements that exist)
  document.getElementById('m_name').textContent = displayName;
  document.getElementById('m_sid').textContent = 'ID: ' + studentIdVal;
  document.getElementById('m_course').textContent = 'Course/Year: ' + courseYear;
  document.getElementById('m_contact').textContent = 'Contact: ' + contact;

  document.getElementById('m_email').textContent = email;
  document.getElementById('m_title').textContent = caseTitle;
  document.getElementById('m_purpose').textContent = purpose;

  document.getElementById('m_opened').textContent =
    opened && opened.toDate
      ? opened.toDate().toLocaleString()
      : (opened || '—');

  let statusVal = (a.status || a.caseStatus || '').trim();
  if (!statusVal) statusVal = a.closed ? 'Closed' : 'Pending';

  const stEl = document.getElementById('m_status_badge');
  stEl.textContent = statusVal;
  stEl.style.color = '#fff';
  stEl.style.background =
    /(approved|active|ongoing)/i.test(statusVal) ? '#4CAF50' :
    /(closed|rejected|resolved)/i.test(statusVal) ? '#F44336' :
    '#9E9E9E';
  stEl.style.padding = '6px 10px';
  stEl.style.borderRadius = '8px';


  // ✅ 4. Show modal
  detailModal.style.display = 'flex';
  detailModal.setAttribute('aria-hidden', 'false');
}


    document.getElementById('closeDetail').addEventListener('click', ()=> {

    // When View Details clicked: try to find student doc (id or uid or name), then show modal
    async function showStudentDetailsAndOpenModal(record){
      try {
        const studentIdTry = String(record.studentID || record.sid || record.studentId || '').trim();
        let studentDoc = null;

        if (studentIdTry) {
          try {
            const snap = await getDoc(doc(db, 'students', studentIdTry));
            if (snap.exists()) studentDoc = { id: snap.id, ...snap.data() };
          } catch(e){ console.warn('students doc fetch by id failed', e); }
        }

        if (!studentDoc && studentIdTry) {
          try {
            const q1 = query(collection(db, 'students'), where('studentID', '==', studentIdTry), limit(1));
            let snaps = await getDocs(q1);
            if (snaps && snaps.size) { studentDoc = { id: snaps.docs[0].id, ...snaps.docs[0].data() }; }
            else {
              const q2 = query(collection(db, 'students'), where('uid', '==', studentIdTry), limit(1));
              snaps = await getDocs(q2);
              if (snaps && snaps.size) { studentDoc = { id: snaps.docs[0].id, ...snaps.docs[0].data() }; }
            }
          } catch(e){ console.warn('students query failed', e); }
        }

        if (!studentDoc && (record.studentName || record.name)) {
          const nameTry = (record.studentName || record.name).toLowerCase();
          try {
            const snaps = await getDocs(collection(db, 'students'));
            for (const d of snaps.docs) {
              const data = d.data() || {};
              const cand = (data.name || data.studentName || data.fullName || '').toLowerCase();
              if (cand && cand === nameTry) { studentDoc = { id: d.id, ...data }; break; }
            }
          } catch(e){ /* ignore */ }
        }

        // populate modal (notes and other fields are taken from record (appointment or consultation))
        populateAndOpenModal({ studentDoc: studentDoc, apptDoc: record });
      } catch (err) {
        console.error('Failed to load student or appointment data for details:', err);
        populateAndOpenModal({ studentDoc: null, apptDoc: record });
      }
    }

    // Start listeners after auth
    onAuthStateChanged(auth, (user) => {
      // if (!user) { location.href = 'Login.html'; return; }
      startListeners();
    });

    function startListeners(){
      // appointments (purpose: Consultation)
      const qRef = query(collection(db, 'appointments'), where('office', '==', 'guidance'));
      onSnapshot(qRef, (snap)=>{
        snap.docs.forEach(d => {
          const data = d.data();
          cache.set(d.id, { id:d.id, _src:'appointments', ...data });
        });
        renderRowsFromCache();
      }, (err)=>{ console.error('Failed to load appointments:', err); });

      // consultations (prefer these for caseTitle, notes etc.)
      try {
        const q2 = query(collection(db, 'consultations'), where('office', '==', 'guidance'));
        onSnapshot(q2, (snap)=>{
          snap.docs.forEach(d => {
            const data = d.data();
            cache.set(d.id, { id:d.id, _src:'consultations', ...data });
          });
          renderRowsFromCache();
        }, (err)=>{ console.warn('consultations snapshot error:', err); });
      } catch(e){ console.warn('consultations listener setup failed', e); }
    }

    searchEl.addEventListener('input', () => renderRowsFromCache());
    statusFilter.addEventListener('change', () => renderRowsFromCache());
    document.addEventListener('keydown', e => { if(e.key === 'Escape'){ detailModal.style.display='none'; detailModal.setAttribute('aria-hidden','true'); }});

document.getElementById('generateBtn')
  .addEventListener('click', exportCasesToPDF);

    function toggleLogout(){ const b = document.getElementById('logoutBtn'); b.style.display = (b.style.display === 'block') ? 'none' : 'block'; }
    window.toggleLogout = toggleLogout;
    function openLogoutConfirm(){ document.getElementById('logoutConfirm').style.display = 'flex'; }
    function closeLogoutConfirm(){ document.getElementById('logoutConfirm').style.display = 'none'; }
    async function logoutNow(){ try{ await signOut(auth); window.location.href = 'Login.html'; } catch(e){ alert('Logout failed: ' + (e?.message || e)); } }
    window.openLogoutConfirm = openLogoutConfirm; window.closeLogoutConfirm = closeLogoutConfirm; window.logoutNow = logoutNow;

  </script>
</body>
