<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Genos:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="AdminUI3.css">
</head>
<body>
<div class="sidebar">
  <div class="logo">
    <img src="icons/FInalLogo.png" alt="Logo"/>
    <h2>Smart</h2>
  </div>
  <button class="active" onclick="window.location.href='AdminUI1.html'">Home</button>
  <button onclick="window.location.href='AdminAppoint.html'">Appointment</button>
  <button onclick="window.location.href='AdminVio.html'">Violations</button>
  <button onclick="window.location.href='AdminCert.html'">Certifications</button>
  <button onclick="window.location.href='AdminUI3.html'">Announcements</button>
  <button onclick="window.location.href='AdminIncident.html'">Incidents</button>
  <button onclick="window.location.href='AdminReport1.html'">Reports</button>
</div>

<div class="main-content">
  <div class="header">
    <div class="user-container">
      <div class="user-icon-container" onclick="toggleLogout()">
        <img src="icons/user-icon.png" alt="User Icon" />
      </div>
      <button class="logout" id="logoutBtn" onclick="openModal()">Logout</button>
    </div>
  </div>

  <!-- Status Cards -->
  <div class="status-cards">
    <div class="card">
      <div class="bord"><img src="icons/quote-request.png" alt="req"></div>
      <p id="pending-requests">0<br><span>Pending<br>Requests</span></p>   
    </div>

    <div class="card">
      <div class="bord"><img src="icons/certificate.png" alt="cert"></div>
      <p id="pending-certs">0<br><span>Pending<br>Incidents</span></p>
    </div>

    <div class="card">
      <div class="bord"><img src="icons/warning (2).png" alt="warn"></div>
      <p id="violations-today">0<br><span>Violations<br>Today</span></p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button onclick="window.location.href='AdminUI1.html'">Recent Violations</button>
    <button onclick="window.location.href='AdminUI2.html'">Upcoming Appointments</button>
    <button class="active" onclick="window.location.href='AdminUI3.html'">Announcements</button>
  </div>

  <!-- Search -->
  <div class="search-container">
    <input id="ann-search" type="text" placeholder="🔍 Search announcements...">
  </div>

  <!-- Table -->
   <div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Title</th><th>Date</th><th>Description</th>
      </tr>
    </thead>
    <tbody id="ann-body"></tbody>
  </table>
  </div>
</div>

<!-- Logout modal -->
<div id="modalOverlay" style="display:none; position:fixed; inset:0; background-color:rgba(0,0,0,.5); justify-content:center; align-items:center; z-index:999;">
  <div style="background:#fff; padding:30px; border-radius:10px; width:300px; text-align:center;">
    <h3>Confirm Logout</h3>
    <p>Are you sure you want to logout?</p>
    <div style="margin-top:20px;">
      <button onclick="logoutNow()" style="background-color:#fdb827; border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer;">Yes</button>
      <button onclick="closeModal()" style="background-color:#ccc; border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer; margin-left:10px;">No</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import {
    getFirestore, collection, query, where, orderBy, onSnapshot, getDocs, doc, getDoc, Timestamp
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAL3PqM_pZclC6QIzijirPZH7zweJ9Im8Y",
    authDomain: "smart-723de.firebaseapp.com",
    projectId: "smart-723de",
    storageBucket: "smart-723de.appspot.com",
    messagingSenderId: "316347306734",
    appId: "1:316347306734:web:51b4babfe97cdb2e06d9ff"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const $ = (id)=>document.getElementById(id);
  const startOfDay = (d)=>{ const x=new Date(d); x.setHours(0,0,0,0); return x; };
  const addDays    = (d,n)=>{ const x=new Date(d); x.setDate(x.getDate()+n); return x; };
  const fmtDate = (dateLike) => {
    const d = (dateLike?.toDate?.()) ? dateLike.toDate() : (dateLike instanceof Date ? dateLike : new Date(dateLike||Date.now()));
    const dd = String(d.getDate()).padStart(2,"0");
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const yyyy = d.getFullYear();
    return `${dd}/${mm}/${yyyy}`;
  };

  // ===== Announcements table =====
  let annCache = [];
  async function resolveAnnouncementsCollection(){
    try { await getDocs(query(collection(db,"announcements"), orderBy("createdAt","desc"))); return "announcements"; }
    catch {}
    try { await getDocs(query(collection(db,"announcement"), orderBy("createdAt","desc")));  return "announcement"; }
    catch {}
    return "announcements";
  }
  async function initAnnouncementsTable(){
  const body = $("ann-body");
  const searchEl = $("ann-search");

  const col = await resolveAnnouncementsCollection();

  const qAnn = query(
    collection(db, col),
    where("postedBy", "==", "Osa"),   // ✅ OSA ONLY
    orderBy("createdAt","desc")
  );

  onSnapshot(qAnn, (snap)=>{
    annCache = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    render();
  });

  searchEl.addEventListener("input", render);

  function render(){
    const q = (searchEl.value||"").toLowerCase();
    const rows = annCache.filter(a=>{
      const hay = `${a.title||""} ${a.content||""}`.toLowerCase();
      return q ? hay.includes(q) : true;
    });

    body.innerHTML = "";
    if (!rows.length){
      body.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#666;padding:12px;">No announcements found.</td></tr>`;
      return;
    }

    rows.forEach(a=>{
      const when = a.createdAt || a.updatedAt || new Date();
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${a.title || "(Untitled)"}</td>
        <td>${fmtDate(when)}</td>
        <td>${a.content || "—"}</td>
      `;
      body.appendChild(tr);
    });
  }
}

  onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "Login.html";
    return;
  }

  try {
    const profSnap = await getDoc(doc(db, "users", user.uid));

    // ❗ DO NOT signOut — just block access
    if (!profSnap.exists()) {
      window.location.href = "Login.html";
      return;
    }

    const role = String(profSnap.data().role || "").toLowerCase();

    // allow admin / osa / superadmin (adjust if needed)
    if (!["admin", "osa", "superadmin"].includes(role)) {
      window.location.href = "Login.html";
      return;
    }

    // ✅ safe to continue
    setupViolationsToday();
    setupPendingRequestsFromGoodMoral();
    document.getElementById("pending-certs").innerHTML =
      `0<br><span>Pending<br>Incidents</span>`;
    initAnnouncementsTable();

  } catch (err) {
    console.error("Failed to load user profile:", err);
    window.location.href = "Login.html";
  }
});


  function setupViolationsToday(){
    const today = startOfDay(new Date());
    const tomorrow = addDays(today,1);
    const qToday = query(
      collection(db,"violations"),
      where("createdAt", ">=", Timestamp.fromDate(today)),
      where("createdAt", "<",  Timestamp.fromDate(tomorrow))
    );
    onSnapshot(qToday, (snap)=>{
      $("violations-today").innerHTML = `${snap.size}<br><span>Violations<br>Today</span>`;
    });
  }

  // NEW: count pending OSA Good Moral requests
  function setupPendingRequestsFromGoodMoral(){
    const qReq = query(
      collection(db,"goodMoralRequest"),
      where("status","in",["pending","Pending"]),
      where("office","in",["osa","OSA","Osa"])
    );
    onSnapshot(qReq, (snap)=>{
      const all = snap.docs.map(d=>({ id:d.id, ...d.data() }));
      $("pending-requests").innerHTML = `${all.length}<br><span>Pending<br>Requests</span>`;
    }, ()=>{
      $("pending-requests").innerHTML = `0<br><span>Pending<br>Requests</span>`;
    });
  }

  // header helpers
  window.toggleLogout = function(){ const logoutBtn = document.getElementById("logoutBtn"); logoutBtn.style.display = (logoutBtn.style.display === "block" ? "none" : "block"); }
  window.openModal  = function(){ document.getElementById("modalOverlay").style.display="flex"; }
  window.closeModal = function(){ document.getElementById("modalOverlay").style.display="none"; }
  window.logoutNow  = async function(){ await signOut(auth); window.location.href="Login.html"; }
</script>

<script>
  function toggleLogout(){ const logoutBtn=document.getElementById("logoutBtn"); logoutBtn.style.display = logoutBtn.style.display==="block"?"none":"block"; }
  function openModal(){ document.getElementById("modalOverlay").style.display="flex"; }
  function closeModal(){ document.getElementById("modalOverlay").style.display="none"; }
  function logoutNow(){ window.location.href="Login.php"; }
</script>
</body>
</html>
