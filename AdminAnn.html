<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin • Announcements</title>
  <link href="https://fonts.googleapis.com/css2?family=Genos:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="AdminAnn.css">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <img src="icons/FInalLogo.png" alt="Logo"/>
      <h2>Smart</h2>
    </div>
    <button onclick="window.location.href='AdminUI1.html'">Home</button>
    <button onclick="window.location.href='AdminAppoint.html'">Appointment</button>
    <button onclick="window.location.href='AdminVio.html'">Violations</button>
    <button onclick="window.location.href='AdminCert.html'">Certifications</button>
    <button class="active" onclick="window.location.href='AdminAnn.html'">Announcements</button>
    <button onclick="window.location.href='AdminIncident.html'">Incidents</button>
    <button onclick="window.location.href='AdminReport1.html'">Reports</button>
  </div>

  <div class="main-content">
    <div class="header">
      <div class="user-container">
        <div class="user-icon-container" onclick="toggleLogout()">
          <img src="icons/user-icon.png" alt="User Icon" />
        </div>
        <button class="logout" id="logoutBtn" onclick="openLogout()">Logout</button>
      </div>
    </div>

    <div class="top-controls">
      <div class="filter-container">
        <button id="openCreate">Create Announcement</button>
      </div>
      <div class="search-container">
        <input type="text" id="search" placeholder="Search...">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Posted on</th>
          <th>Visibility</th>
          <th>Attachment</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="annBody"></tbody>
    </table>
  </div>

  <!-- Create / Edit Modal -->
  <div id="createModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close" role="button" tabindex="0">&times;</span>
      <h2 style="text-align:center; font-family:'Genos', sans-serif;">Create Announcement</h2>

      <form id="annForm" novalidate>
        <input type="text" id="title" placeholder="Title" required />
        <textarea id="content" placeholder="Write your announcement here..." required></textarea>
        <input
        type="text"
        id="visibility"
        value="All Students"
        readonly
        style="background:#f5f5f5; cursor:not-allowed;"
      />



        <!-- hidden native file input (kept for accessibility but visually hidden) -->
        <input
          type="file"
          id="attachment"
          accept="image/*,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation,text/plain"
          aria-label="Attachment (images, pdf, office documents)"
        />

        <!-- visible, styled file label that matches the Title input width/appearance -->
        <label id="attachmentLabel" for="attachment" role="button" tabindex="0">
          Click to choose a file (optional)
        </label>

        <div id="attachmentName" aria-live="polite"></div>
        <div id="attachmentPreview" style="margin-top:10px;"></div>


        <button id="submitBtn" type="submit">Disseminate</button>

      </form>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirmModal" class="confirm-modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="confirm-box" role="document" aria-labelledby="confirmTitle">
      <h3 id="confirmTitle">Confirm delete</h3>
      <p id="confirmMessage">Are you sure you want to delete this announcement?</p>
      <div id="confirmMeta" style="font-size:16px; color:#666;"></div><br>

      <div style="display:flex; justify-content: space-between; align-items: center;">
        
        <div class="confirm-actions">
          <button class="btn cancel" id="cancelDeleteBtn" type="button">Cancel</button>
          <button class="btn danger" id="confirmDeleteBtn" type="button">Delete</button>
        </div>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
    onSnapshot, query, orderBy, serverTimestamp, getDocs, limit, getDoc
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAL3PqM_pZclC6QIzijirPZH7zweJ9Im8Y",
    authDomain: "smart-723de.firebaseapp.com",
    projectId: "smart-723de",
    storageBucket: "smart-723de.appspot.com",
    messagingSenderId: "316347306734",
    appId: "1:316347306734:web:51b4babfe97cdb2e06d9ff"
  };


  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const $ = (id)=>document.getElementById(id);
  const annBody = $("annBody");
  const searchInput = $("search");
  const modal = $("createModal");
  const openCreateBtn = $("openCreate");
  const closeX = document.querySelector("#createModal .close");
  const form = $("annForm");
  const submitBtn = $("submitBtn");
  const titleEl = $("title");
  const contentEl = $("content");
  const visibilityEl = $("visibility");
  const attachmentEl = $("attachment");
  const attachmentLabel = $("attachmentLabel");
  const attachmentName = $("attachmentName");
  const attachmentPreview = $("attachmentPreview");


  // confirm modal elements
  const confirmModal = $("confirmModal");
  const confirmDeleteBtn = $("confirmDeleteBtn");
  const cancelDeleteBtn = $("cancelDeleteBtn");
  const confirmMeta = $("confirmMeta");

  window.toggleLogout = function(){ const b=$("logoutBtn"); b.style.display = (b.style.display==="block")?"none":"block"; }
  window.openLogout  = function(){ signOut(auth); }

  let editing = null; // { id, data } or null
  let COLLECTION = "announcements";
  let unsubscribe = null;
  let cache = [];

  function openModal(editId = null, data = null) {
  editing = editId ? { id: editId, data } : null;
  modal.style.display = "block";

  titleEl.value = data?.title || "";
  contentEl.value = data?.content || "";
  visibilityEl.value = data?.visibility || "All Students";

  // reset file input
  attachmentEl.value = "";
  attachmentPreview.innerHTML = "";
  attachmentName.textContent = "";

  // show existing attachment (EDIT MODE)
  if (data?.attachmentName) {
    attachmentName.textContent = `Current file: ${data.attachmentName}`;

    // IMAGE PREVIEW
    if (data.attachmentType?.startsWith("image/") && data.attachmentDataUrl) {
      attachmentPreview.innerHTML = `
        <img 
          src="${data.attachmentDataUrl}" 
          alt="Attachment preview"
          style="max-width:100%; max-height:220px; border-radius:8px; border:1px solid #ddd; margin-left: 150px; margin-bottom: 10px;"
        />
      `;
    } 
    // NON-IMAGE FILE
    else {
      attachmentPreview.innerHTML = `
        <p style="font-size:14px;color:#555;">
          Attached file: <strong>${data.attachmentName}</strong>
        </p>
      `;
    }

    attachmentLabel.textContent = "Replace file (optional)";
  } else {
    attachmentLabel.textContent = "Click to choose a file (optional)";
  }

  submitBtn.textContent = editing ? "Update" : "Disseminate";
}

  function closeModal(){ modal.style.display = "none"; editing = null; form.reset(); }

  openCreateBtn.addEventListener("click", ()=>openModal());
  closeX.addEventListener("click", closeModal);
  modal.addEventListener("click", (e)=>{ if(e.target===modal) closeModal(); });

  // label -> filepicker for keyboard accessibility
  // NOTE: remove the click listener to avoid double-opening the file picker.
  // Clicking the <label for="attachment"> uses native behavior; the keydown lets keyboard users open it.
  attachmentLabel.addEventListener("keydown", (e)=> {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      attachmentEl.click();
    }
  });

  attachmentEl.addEventListener("change", ()=> {
    const f = attachmentEl.files[0];
    attachmentName.textContent = f ? `Selected: ${f.name}` : "";
    if (f) attachmentLabel.textContent = f.name;
    else attachmentLabel.textContent = "Click to choose a file (optional)";
  });

  const MAX_INLINE_FILE_BYTES = 900 * 1024;

  function fmtDate(ts){
    if (!ts) return "—";
    if (typeof ts.toDate === "function") ts = ts.toDate();
    const dd=String(ts.getDate()).padStart(2,"0");
    const mm=String(ts.getMonth()+1).padStart(2,"0");
    const yy=ts.getFullYear();
    return `${mm}/${dd}/${yy}`;
  }
  function sanitizeFileName(name){ return name.replace(/[^\w.\-() ]+/g,"_"); }
  function esc(s){ return (s||"").replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m])); }
  function showError(label, err){
    console.error(label, err);
    alert(`${label}:\n${err?.code||""} ${err?.message||err}`);
  }
  function fileToDataURL(file){
    return new Promise((resolve, reject)=>{
      const fr = new FileReader();
      fr.onload = () => resolve(String(fr.result));
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  function renderEmpty(){
    annBody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#666;padding:12px;">No announcements yet.</td></tr>`;
  }
  function render(){
    const q=(searchInput.value||"").toLowerCase();
    const rows=cache.filter(a=>{
      const hay=`${a.title||""} ${a.visibility||""} ${(a.attachmentName||"")}`.toLowerCase();
      return q?hay.includes(q):true;
    });
    annBody.innerHTML="";
    if(!rows.length) return renderEmpty();
    rows.forEach(a=>{
      const tr=document.createElement("tr");
      const tdTitle=document.createElement("td"); tdTitle.textContent=a.title||"(Untitled)";
      const tdDate=document.createElement("td"); tdDate.textContent=fmtDate(a.createdAt);
      const tdVis=document.createElement("td"); tdVis.textContent=a.visibility||"All Students";
      const tdAtt=document.createElement("td");

      let attCell = "—";
      if (a.attachmentName) {
        if (a.attachmentUrl) {
          attCell = `<a class="attachment-file" href="${a.attachmentUrl}" target="_blank" rel="noopener">${esc(a.attachmentName)}</a>`;
        } else if (a.attachmentDataUrl) {
          attCell = `<a class="attachment-file" href="${a.attachmentDataUrl}" download="${esc(a.attachmentName)}" target="_blank" rel="noopener">${esc(a.attachmentName)}</a>`;
        } else {
          attCell = esc(a.attachmentName);
        }
      }
      tdAtt.innerHTML = attCell;

      const tdAct=document.createElement("td"); tdAct.className="action-buttons";
      const edit=document.createElement("button"); edit.textContent="Edit";
      edit.addEventListener("click",()=>openModal(a.id,a));
      const del=document.createElement("button"); del.textContent="Delete";
      // open confirm modal instead of immediate confirm()
      del.addEventListener("click", ()=> {
        showDeleteConfirm(a.id, a.title || "(Untitled)");
      });
      tdAct.append(edit,del);

      tr.append(tdTitle,tdDate,tdVis,tdAtt,tdAct);
      annBody.appendChild(tr);
    });
  }
  searchInput.addEventListener("input", render);

  async function resolveCollectionName(){
    try{ const s1=await getDocs(query(collection(db,"announcements"),limit(1))); if(s1.size>0) return "announcements"; }catch{}
    try{ const s2=await getDocs(query(collection(db,"announcement"),limit(1))); if(s2.size>0) return "announcement"; }catch{}
    return "announcements";
  }

  // NEW: snapshot handler now filters out guidance-created announcements
  async function initAnnouncements(){
    const col = await resolveCollectionName();
    if (col !== COLLECTION && unsubscribe) { unsubscribe(); }
    COLLECTION = col;

    const qAnn=query(collection(db,COLLECTION),orderBy("createdAt","desc"));
    unsubscribe=onSnapshot(qAnn,
      // snapshot callback can be async to allow profile lookups
      async (snap)=>{
        try{
          // map docs with optional resolved creator role
          const mapped = await Promise.all(snap.docs.map(async d=>{
            const data = d.data();
            const out = { id:d.id, ...data };
            // if the doc contains a stored creator role, use it
            if (out.createdByRole) {
              out._resolvedRole = String(out.createdByRole).toLowerCase();
            } else if (out.createdBy) {
              // otherwise try to fetch the user's profile to determine role
              try{
                const ud = await getDoc(doc(db,"users",out.createdBy));
                if (ud.exists()) out._resolvedRole = String(ud.data().role||"").toLowerCase();
              }catch(err){
                console.warn("Failed to fetch user profile for announcement creator", out.createdBy, err);
              }
            } else {
              out._resolvedRole = null;
            }
            return out;
          }));

          // Filter: keep only announcements created by admin role OR created by current admin UID
          const me = auth.currentUser?.uid || null;
          cache = mapped.filter(a=>{
            const role = String(a._resolvedRole || "").toLowerCase();
            if (role === "admin") return true;
            if (a.createdBy && me && a.createdBy === me) return true;
            return false;
          });

          render();
        }catch(e){
          showError("Failed processing announcements", e);
        }
      },
      err=>{ showError("Failed to load announcements", err); }
    );
  }

  // ===== delete confirmation logic =====
  // shows confirm modal and stores target id in dataset
  function showDeleteConfirm(docId, titleText){
    confirmModal.style.display = "flex";
    confirmModal.setAttribute("aria-hidden", "false");
    confirmMeta.textContent = titleText ? `Title: ${titleText}` : "";
    confirmDeleteBtn.dataset.deleteId = docId;
    cancelDeleteBtn.focus();
  }

  function closeDeleteConfirm(){
    confirmModal.style.display = "none";
    confirmModal.setAttribute("aria-hidden", "true");
    confirmDeleteBtn.removeAttribute("data-delete-id");
    confirmMeta.textContent = "";
  }

  // cancel handler
  cancelDeleteBtn.addEventListener("click", ()=> closeDeleteConfirm());

  // clicking outside the box closes the modal
  confirmModal.addEventListener("click", (e)=>{
    if (e.target === confirmModal) closeDeleteConfirm();
  });

  // confirm delete
  confirmDeleteBtn.addEventListener("click", async ()=>{
    const id = confirmDeleteBtn.dataset.deleteId;
    if (!id) { closeDeleteConfirm(); return; }
    try {
      await deleteDoc(doc(db, COLLECTION, id));
      closeDeleteConfirm();
    } catch (err) {
      showError("Delete failed", err);
    }
  });

  async function onSubmit(e){
    e.preventDefault();

    const title = titleEl.value.trim();
    const content = contentEl.value.trim();
    const visibility = visibilityEl.value;
    const file = attachmentEl.files[0] || null;

    if(!title){ alert("Please provide a title."); titleEl.focus(); return; }
    if(!content){ alert("Please provide content."); contentEl.focus(); return; }

    if (file && file.size > MAX_INLINE_FILE_BYTES) {
      alert(`File is too large (${Math.round(file.size/1024)} KB). Max inline size is ${Math.round(MAX_INLINE_FILE_BYTES/1024)} KB.\n\nPlease choose a smaller file or compress the image.`);
      return;
    }

    const original = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = editing ? "Updating…" : "Publishing…";

    try {
      let attachmentFields = {
        attachmentName: null,
        attachmentType: null,
        attachmentSize: null,
        attachmentUrl: null,
        attachmentDataUrl: null
      };

      if (file) {
        const dataUrl = await fileToDataURL(file);
        attachmentFields = {
          attachmentName: sanitizeFileName(file.name),
          attachmentType: file.type || "application/octet-stream",
          attachmentSize: file.size || null,
          attachmentUrl: null,
          attachmentDataUrl: dataUrl
        };
      }

      if (editing) {
        const docRef = doc(db, COLLECTION, editing.id);
        await updateDoc(docRef, {
          title, content, visibility,
          ...attachmentFields,
          updatedAt: serverTimestamp()
        });
      } else {
        // store createdByRole to make later filtering cheaper (optional)
        const createdByRole = await (async ()=>{
          try{
            const prof = await getDoc(doc(db,"users", auth.currentUser.uid));
            if (prof.exists()) return prof.data().role || null;
          }catch(err){ console.warn("Could not resolve creator role at post time", err); }
          return null;
        })();

        await addDoc(collection(db, COLLECTION), {
          title, content, visibility,
          ...attachmentFields,
          createdAt: serverTimestamp(),
          createdBy: auth.currentUser?.uid || null,
          createdByRole: createdByRole || null,
          smsSent: false // 👈 ADD THIS
        });
      }

      submitBtn.textContent = "Done!";
      setTimeout(()=>submitBtn.textContent = original, 400);
      form.reset();
      attachmentLabel.textContent = "Click to choose a file (optional)";
      attachmentName.textContent = "";
      editing = null;
      closeModal();
    } catch (err) {
      showError("Failed to save announcement", err);
    } finally {
      submitBtn.disabled = false;
      if (submitBtn.textContent !== original) submitBtn.textContent = original;
    }
  }

  form.addEventListener("submit", onSubmit);

  onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "Login.html";
    return;
  }

  let prof;
  try {
    prof = await getDoc(doc(db, "users", user.uid));
  } catch (err) {
    console.error("Profile load failed:", err);
    return; // 🚫 DO NOT LOGOUT
  }

  if (!prof.exists()) {
    console.warn("User profile missing");
    return; // 🚫 DO NOT LOGOUT
  }

  const role = String(prof.data().role || "").toLowerCase();

  // ✅ ALLOW ADMIN + OSA
  if (!["admin", "osa"].includes(role)) {
    window.location.href = "Login.html";
    return; // 🚫 redirect only
  }

  // ✅ user stays logged in
  await initAnnouncements();
});

</script>

</body>
</html>
